services:
  # OpenCode server pulled from GHCR.
  opencode:
    hostname: playground
    container_name: opencode
    build: .
    image: ghcr.io/iamevanyt/opencode-playground:latest
    restart: unless-stopped

    # Publish the OpenCode server port to the host.
    ports:
      - "127.0.0.1:4096:4096"

    # Make the current project available inside the container.
    volumes:
      - ./projects:/projects
      - ./volumes/local:/home/opencode/.local
      - ./volumes/cache:/home/opencode/.cache
      - ./volumes/config:/home/opencode/.config
      - ./volumes/oc/commands:/home/opencode/.opencode/commands
      - ./volumes/oc/opencode.json:/home/opencode/.opencode/opencode.json

    # Load .env if it exists (optional).
    env_file:
      - path: .env
        required: false

    # Keep the server reachable from outside the container.
    environment:
      PORT: "4096"
