services:
  # OpenCode server pulled from GHCR.
  opencode:
    hostname: playground
    container_name: opencode
    image: ghcr.io/iamevanyt/opencode-playground:latest
    restart: unless-stopped

    # Publish the OpenCode server port to the host.
    ports:
      - "127.0.0.1:4096:4096"

    # Make the current project available inside the container.
    volumes:
      - ./projects:/projects
      - ./home:/home/opencode/

    # Keep the server reachable from outside the container.
    environment:
      PORT: "4096"
